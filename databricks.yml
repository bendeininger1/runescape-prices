# This is a Databricks asset bundle definition for runescape-prices.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: runescape-prices

include:
  - resources/*.yml
  
sync:
  include:
    - dist/*.whl

variables:
  catalog:
    default: "runescape_dev"
  dev_flag:
    default: true
  service_principal_id:
    description: UUID for service principal
    default: missing service principal id value

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://adb-7405610673533920.0.azuredatabricks.net

  test:
    mode: production
    variables:
      catalog:
        default: "runescape_test"
      dev_flag:
        default: false
    presets:
      name_prefix: '[testing] '
      trigger_pause_status: PAUSED
    workspace:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - service_principal_name: ${var.service_principal_id} # update with your service principal name
        level: CAN_MANAGE
    run_as:
      service_principal_name: ${var.service_principal_id} # update with your service principal name

  prod:
    mode: production
    variables:
      catalog:
        default: "runescape_prod"
      dev_flag:
        default: false
    workspace:
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - service_principal_name: ${var.service_principal_id} # update with your service principal name
        level: CAN_MANAGE
    run_as:
      service_principal_name: ${var.service_principal_id} # update with your service principal name