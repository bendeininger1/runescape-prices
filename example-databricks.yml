#This is an example asset bundle definition for runescape-prices
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: runescape-prices

include:
  - resources/*.yml

variables:
  catalog:
    default: "runescape_dev"
  dev_flag:
    default: true

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: # update with your workspace url

  test:
    mode: production
    variables:
      catalog:
        default: "runescape_test"
      dev_flag:
        default: false
    presets:
      name_prefix: '[testing] '
    workspace:
      host: # update with your workspace url
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - user_name: # update with your service principal name
        level: CAN_MANAGE
    run_as:
      user_name: # update with your service principal name

  prod:
    mode: production
    variables:
      catalog:
        default: "runescape_prod"
      dev_flag:
        default: false
    workspace:
      host: # update with your url
      root_path: /Workspace/Shared/.bundle/${bundle.name}/${bundle.target}
    permissions:
      - user_name: # update with your service principal name
        level: CAN_MANAGE
    run_as:
      user_name: # update with your service principal name