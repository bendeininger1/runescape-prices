name: CD Workflow

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  cd-deploy-test:
    name: Deploy to TEST
    runs-on: ubuntu-latest
    environment: test
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12.3'

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel
          python setup.py bdist_wheel
          pip install ./dist/rs_project-0.0.10-py3-none-any.whl
          pip install -r requirements-pyspark.txt

      - name: Configure Databricks
        run: |
          # write out the profile (here called "TEST")
          cat <<EOF > ~/.databrickscfg
          [TEST]
          host = https://adb-7405609042674093.13.azuredatabricks.net
          DATABRICKS_TOKEN: = ${{ secrets.SP_TOKEN }}
          DATABRICKS_BUNDLE_ENV: test
          EOF

      - run: databricks bundle deploy
        working-directory: .
        env:
          DATABRICKS_AUTH_TYPE: github-oidc
          DATABRICKS_HOST: https://adb-7405609042674093.13.azuredatabricks.net
          DATABRICKS_CLIENT_ID: 07ec66d2-eff9-4580-91c1-1fdef498c3e7

  cd-deploy-prod:
    name: Deploy to PROD
    needs: cd-deploy-test
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - name: Checkout code
        uses: actions/checkout@v6.0.2

      - name: Setup Python
        uses: actions/setup-python@v6.2.0
        with:
          python-version: '3.12.3'

      - name: Install Databricks CLI
        uses: databricks/setup-cli@main

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel
          python setup.py bdist_wheel
          pip install ./dist/rs_project-0.0.10-py3-none-any.whl
          pip install -r requirements-pyspark.txt

      - name: Configure Databricks
        run: |
          # write out the profile (here called "PROD")
          cat <<EOF > ~/.databrickscfg
          [TEST]
          host = https://adb-7405604569792585.5.azuredatabricks.net
          DATABRICKS_TOKEN: ${{ secrets.SP_TOKEN }}
          DATABRICKS_BUNDLE_ENV: prod
          EOF
          
      - run: databricks bundle deploy --target prod
        working-directory: .
        env:
          DATABRICKS_HOST: https://adb-7405604569792585.5.azuredatabricks.net
          DATABRICKS_TOKEN: ${{ secrets.SP_TOKEN }}
          DATABRICKS_BUNDLE_ENV: prod
