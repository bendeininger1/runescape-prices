resources:
  jobs:
    runescape_prices_ingest:
      name: runescape_prices_ingest
      schedule:
        quartz_cron_expression: 58 * * * * ?
        timezone_id: America/New_York
        pause_status: UNPAUSED
      tasks:
        - task_key: 00_ingest_latest_prices
          notebook_task:
            notebook_path: transformations/00_landing/ingest_latest_prices
            source: GIT
          environment_key: Default
      git_source:
        git_url: https://github.com/bendeininger1/runescape-prices
        git_provider: gitHub
        git_branch: main
      queue:
        enabled: true
      environments:
        - environment_key: Default
          spec:
            environment_version: "4"
      performance_target: PERFORMANCE_OPTIMIZED
