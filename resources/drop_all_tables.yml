resources:
  jobs:
    drop_all_tables:
      name: drop_all_tables
      tasks:
        - task_key: 00_drop_all_tables
          notebook_task:
            notebook_path: ../one_off/drop_all_tables.ipynb
            source: WORKSPACE
          environment_key: Default
      parameters:
        - name: catalog
          default: ${var.catalog}
      environments:
        - environment_key: Default
          spec:
            environment_version: "5"
      performance_target: PERFORMANCE_OPTIMIZED
