resources:
  jobs:
    ingest_1h_prices:
      name: ingest_1h_prices
      schedule:
        quartz_cron_expression: 45 10 * * * ?
        timezone_id: UTC
        pause_status: UNPAUSED
      tasks:
        - task_key: 00_ingest_1h_prices
          notebook_task:
            notebook_path: ../transformations/00_landing/ingest_1h_prices.ipynb
            base_parameters:
              catalog: "${var.catalog}"
            source: WORKSPACE
          environment_key: Default
        - task_key: 01_1hr_prices
          depends_on:
            - task_key: 00_ingest_1h_prices
          notebook_task:
            notebook_path: ../transformations/01_bronze/1h_prices.ipynb\
            base_parameters:
              catalog: "${var.catalog}"
            source: WORKSPACE
          environment_key: Default
        - task_key: 02_1h_prices_cleansed
          depends_on:
            - task_key: 01_1hr_prices
          notebook_task:
            notebook_path: ../transformations/02_silver/1h_prices_cleansed.ipynb
            base_parameters:
              catalog: "${var.catalog}"
            source: WORKSPACE
          environment_key: Default
        - task_key: 03_1h_prcies_enriched
          depends_on:
            - task_key: 02_1h_prices_cleansed
          notebook_task:
            notebook_path: ../transformations/02_silver/1h_prices_enriched.ipynb
            base_parameters:
              catalog: "${var.catalog}"
            source: WORKSPACE
          environment_key: Default
        - task_key: 04_1h_prices_last_enriched
          depends_on:
            - task_key: 03_1h_prcies_enriched
          notebook_task:
            notebook_path: ../transformations/02_silver/1h_prices_last_enriched.ipynb
            base_parameters:
              catalog: "${var.catalog}"
            source: WORKSPACE
          environment_key: Default
        - task_key: 05_1h_skill_profit
          depends_on:
            - task_key: 04_1h_prices_last_enriched
          notebook_task:
            notebook_path: ../transformations/03_gold/1h_skill_profit.ipynb
            base_parameters:
              catalog: "${var.catalog}"
            source: WORKSPACE
          environment_key: Default
      queue:
        enabled: true
      environments:
        - environment_key: Default
          spec:
            environment_version: "4"
      performance_target: PERFORMANCE_OPTIMIZED
