resources:
  jobs:
    # job to delelte old records in 1m_prices_raw
    # TODO this should be replacecd by an archival 
    delete_old_records_1m_prices_raw:
      name: delete_old_records_1m_prices_raw
      email_notifications:
        on_failure:
          - bendeiningerdatabricks@gmail.com
        on_duration_warning_threshold_exceeded:
          - bendeiningerdatabricks@gmail.com
      trigger:
        periodic:
          interval: 6
          unit: HOURS
      tasks:
        - task_key: 01_delete_old_records_1m_prices_raw
          notebook_task:
            notebook_path: ../transformations/01_bronze/delete_old_records_1m_prices_raw.ipynb
            base_parameters:
              catalog: "${var.catalog}"
            source: WORKSPACE
          environment_key: Default
      # Only 1 instance of this job should run at a time
      queue:
        enabled: false
      environments:
        - environment_key: Default
          spec:
            environment_version: "5"
      performance_target: PERFORMANCE_OPTIMIZED
