resources:
  jobs:
    transform_1m_prices_silver:
      name: transform_1m_prices_silver
      schedule:
        quartz_cron_expression: 38 3/10 * * * ?
        timezone_id: America/New_York
      tasks:
        - task_key: 01_1m_prices_cleansed
          notebook_task:
            notebook_path: ../transformations/02_silver/1m_prices_cleansed.ipynb
            source: WORKSPACE
          environment_key: Default
        - task_key: 02_1m_prices_enriched
          depends_on:
            - task_key: 01_1m_prices_cleansed
          notebook_task:
            notebook_path: ../transformations/02_silver/1m_prices_enriched.ipynb
            source: WORKSPACE
          environment_key: Default
      queue:
        enabled: true
      parameters:
        - name: catalog
          default: ${var.catalog}
      environments:
        - environment_key: Default
          spec:
            environment_version: "5"
      performance_target: PERFORMANCE_OPTIMIZED
