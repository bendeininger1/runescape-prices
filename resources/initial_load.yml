resources:
  jobs:
    initial_load:
      name: initial_load
      email_notifications:
        on_failure:
          - bendeiningerdatabricks@gmail.com
        on_duration_warning_threshold_exceeded:
          - bendeiningerdatabricks@gmail.com
      max_concurrent_runs: 1
      # This job takes roughly 3 minutes to run
      # timeout after 10 minutes
      timeout_seconds: 600
      health:
        # Set rule for 5 minutes
        rules:
          - metric: RUN_DURATION_SECONDS
            op: GREATER_THAN
            value: 300
      tasks:
        - task_key: 01_1m_prices_raw_table_create
          notebook_task:
            notebook_path: ../one_off/initial_load/01_bronze/1m_prices_raw_table_create.ipynb
            source: WORKSPACE
          environment_key: Default
        - task_key: 01_1h_prices_table_create
          notebook_task:
            notebook_path: ../one_off/initial_load/01_bronze/1h_prices_table_create.ipynb
            source: WORKSPACE
          environment_key: Default
        - task_key: 01_skill_action_bronze_table_create
          notebook_task:
            notebook_path: ../one_off/initial_load/01_bronze/1h_prices_table_create.ipynb
            source: WORKSPACE
          environment_key: Default
        - task_key: 01_1m_prices_cleansed_table_create
          notebook_task:
            notebook_path: ../one_off/initial_load/02_silver/1m_prices_cleansed_table_create.ipynb
            source: WORKSPACE
          environment_key: Default
        - task_key: 01_1m_prices_enriched_table_create
          notebook_task:
            notebook_path: ../one_off/initial_load//02_silver/1m_prices_enriched_table_create.ipynb
            source: WORKSPACE
          environment_key: Default
        - task_key: 01_1h_prices_cleansed_table_create
          notebook_task:
            notebook_path: ../one_off/initial_load/02_silver/1h_prices_cleansed_table_create.ipynb
            source: WORKSPACE
          environment_key: Default
        - task_key: 01_1h_prices_enriched_table_create
          notebook_task:
            notebook_path: ../one_off/initial_load/02_silver/1h_prices_enriched_table_create.ipynb
            source: WORKSPACE
          environment_key: Default
        - task_key: 01_1h_prices_last_enriched_table_create
          notebook_task:
            notebook_path: ../one_off/initial_load/02_silver/1h_prices_last_enriched_table_create.ipynb
            source: WORKSPACE
          environment_key: Default
        - task_key: 01_item_mapping_table_create
          notebook_task:
            notebook_path: ../one_off/initial_load/02_silver/item_mapping_table_create.ipynb
            source: WORKSPACE
          environment_key: Default
        - task_key: 01_1h_skill_profit_table_create
          notebook_task:
            notebook_path: ../one_off/initial_load/03_gold/1h_skill_profit_table_create.ipynb
            source: WORKSPACE
          environment_key: Default
        - task_key: 01_load_item_mapping
          notebook_task:
            notebook_path: ../one_off/initial_load/00_landing/load_item_mapping.ipynb
            source: WORKSPACE
          environment_key: Default
        - task_key: 01_skill_action_silver_table_create
          notebook_task:
            notebook_path: ../one_off/initial_load/02_silver/skill_action_silver_table_create.ipynb
            source: WORKSPACE
          environment_key: Default
        - task_key: 02_skill_action_data_load
          depends_on:
            - task_key: 01_load_item_mapping
            - task_key: 01_skill_action_bronze_table_create
          notebook_task:
            notebook_path: ../one_off/initial_load/01_bronze/skill_action_data_load.ipynb
            source: WORKSPACE
        - task_key: 03_item_mapping
          depends_on:
            - task_key: 02_skill_action_data_load
            - task_key: 01_item_mapping_table_create
          notebook_task:
            notebook_path: ../one_off/initial_load/02_silver/item_mapping.ipynb
            source: WORKSPACE
          environment_key: Default
        - task_key: 04_skill_action_enriched
          depends_on:
            - task_key: 03_item_mapping
            - task_key: 01_skill_action_silver_table_create
          notebook_task:
            notebook_path: ../one_off/initial_load/02_silver/skill_action_enriched.ipynb
            source: WORKSPACE
          environment_key: Default 
      # Only 1 instance of this job should run
      queue:
        enabled: false
      parameters:
        - name: catalog
          default: ${var.catalog}
      environments:
        - environment_key: Default
          spec:
            environment_version: "5"
      performance_target: PERFORMANCE_OPTIMIZED
