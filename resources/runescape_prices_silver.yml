resources:
  jobs:
    runescape_prices_silver:
      name: runescape_prices_silver
      schedule:
        quartz_cron_expression: 38 3/10 * * * ?
        timezone_id: America/New_York
        pause_status: UNPAUSED
      tasks:
        - task_key: 02_latest_prices_cleansed
          notebook_task:
            notebook_path: transformations/02_silver/latest_prices_cleansed
            source: GIT
          environment_key: Default
        - task_key: 02_latest_prices_enriched
          depends_on:
            - task_key: 02_latest_prices_cleansed
          notebook_task:
            notebook_path: transformations/02_silver/latest_prices_enriched
            source: GIT
          environment_key: Default
      git_source:
        git_url: https://github.com/bendeininger1/runescape-prices
        git_provider: gitHub
        git_branch: main
      queue:
        enabled: true
      environments:
        - environment_key: Default
          spec:
            environment_version: "4"
      performance_target: PERFORMANCE_OPTIMIZED
