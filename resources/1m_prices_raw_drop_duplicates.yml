resources:
  jobs:
    1m_prices_raw_drop_duplicates:
      name: 1m_prices_raw_drop_duplicates
      schedule:
        quartz_cron_expression: 36 0/10 * * * ?
        timezone_id: America/New_York
      tasks:
        - task_key: 00_drop_duplicates_raw_table
          notebook_task:
            notebook_path: ../transformations/01_bronze/drop_duplicates_raw_table.ipynb
            source: WORKSPACE
          environment_key: Default
      queue:
        enabled: true
      parameters:
        - name: catalog
          default: ${var.catalog}
      environments:
        - environment_key: Default
          spec:
            environment_version: "5"
      performance_target: PERFORMANCE_OPTIMIZED
