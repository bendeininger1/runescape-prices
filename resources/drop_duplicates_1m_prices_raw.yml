resources:
  jobs:
    drop_duplicates_1m_prices_raw:
      name: drop_duplicates_1m_prices_raw
      schedule:
        quartz_cron_expression: 36 0/10 * * * ?
        timezone_id: America/New_York
      tasks:
        - task_key: 00_drop_duplicates_1m_prices_raw
          notebook_task:
            notebook_path: ../transformations/01_bronze/1m_prices_raw_drop_duplicates.ipynb
            source: WORKSPACE
          environment_key: Default
      queue:
        enabled: true
      parameters:
        - name: catalog
          default: ${var.catalog}
      environments:
        - environment_key: Default
          spec:
            environment_version: "5"
      performance_target: PERFORMANCE_OPTIMIZED
